<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios</title>
    <link rel="stylesheet" href="/css/contabilidad.css">
</head>
<body>

<div class="form-container">
    <h2>Contabilidad</h2>
    <form action="#" method="POST">
        
        <div class="form-group">
            <label for="nombre">Ingresos</label>
            <input type="text" id="Ingresos" name="Ingresos" required placeholder="">
        </div>

        <div class="form-group">
            <label for="apellido">Egresos</label>
            <input type="text" id="Egresos" name="Egresos" required placeholder="">
        </div>

        <div class="form-group">
            <label for="telefono">Concepto</label>
            <input type="tel" id="Concepto" name="Concepto" required placeholder="">
        </div>

        <div class="form-group">
            <label for="fecha_nacimiento">Fecha</label>
            <input type="date" id="Fecha" name="Fecha" required>
        </div>

        <a href="/index.html"><button type="submit" class="btn-submit">Subir</button></a>

    </form>
    <a href="/index.html"><button type="button" class="btn-submit">Inicio</button></a>

</div>

</body>
</html>
