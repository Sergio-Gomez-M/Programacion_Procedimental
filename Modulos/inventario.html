<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario</title>
    <link rel="stylesheet" href="/css/inventario.css">
</head>
<body>

<div class="form-container">
    <h2>Registro de Inventario</h2>
    
    <form action="#" method="POST">
        
        <div class="form-group">
            <label for="codigo">Código de Producto:</label>
            <input type="text" id="codigo" name="codigo" placeholder="Ej: PROD-1023" required>
        </div>

        <div class="form-group">
            <label for="nombre">Nombre del Producto:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej: Salsa de tomate" required>
        </div>

        <div class="form-group">
            <label for="cantidad">Cantidad:</label>
            <input type="number" id="cantidad" name="cantidad" min="0" placeholder="Ej: 50" required>
        </div>

        <div class="form-group">
            <label for="descripcion">Descripción:</label>
            <textarea id="descripcion" name="descripcion" placeholder="Detalles del producto, empaque, etc."></textarea>
        </div>

        <div class="form-group">
            <label for="marca">Marca:</label>
            <input type="text" id="marca" name="marca" placeholder="Ej: Fruco" required>
        </div>

        <div class="form-group">
            <label for="valor_unitario">Valor Unitario ($):</label>
            <input type="number" id="valor_unitario" name="valor_unitario" min="0" step="0.01" placeholder="Ej: 4.50" required>
        </div>

        <div class="form-group">
            <label for="categoria">Categoría:</label>
            <select id="categoria" name="categoria" required>
                <option value="" disabled selected>Selecciona una categoría</option>
                <option value="carnes">Carnes y Pescados</option>
                <option value="verduras">Frutas y Verduras</option>
                <option value="abarrotes">Abarrotes y Conservas</option>
                <option value="lacteos">Lácteos y Quesos</option>
                <option value="bebidas">Bebidas y Refrescos</option>
                <option value="limpieza">Elementos de Limpieza</option>
            </select>
        </div>

        <div class="form-group">
            <label for="ubicacion">Ubicación en el Restaurante:</label>
            <select id="ubicacion" name="ubicacion" required>
                <option value="" disabled selected>Selecciona la ubicación</option>
                <option value="nevera_1">Nevera Principal</option>
                <option value="congelador">Congelador</option>
                <option value="alacena_a">Alacena A (Secos)</option>
                <option value="alacena_b">Alacena B (Líquidos)</option>
                <option value="barra">Zona de Barra</option>
            </select>
        </div>

        <a href="/index.html"><button type="submit" class="btn-submit">Guardar en Inventario</button></a>

    </form>
    <a href="/index.html"><button type="button" class="btn-submit">Inicio</button></a>

</div>

</body>
</html>
